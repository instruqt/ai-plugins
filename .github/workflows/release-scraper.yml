name: Release scraper CLI

on:
  workflow_dispatch:
    inputs:
      cli_image_tag:
        description: 'Scraper Docker image tag (commit SHA from mono repo)'
        required: true
        type: string
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  cli_image: ${{ vars.SCRAPER_IMAGE }}
  workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

jobs:
  extract-and-release:
    name: Extract binaries and create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.workload_identity_provider }}
          service_account: ${{ env.service_account }}

      - name: Login to GAR
        uses: docker/login-action@v4
        with:
          registry: europe-west1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Pull CLI image
        run: docker pull "${{ env.cli_image }}:${{ inputs.cli_image_tag }}"

      - name: Extract platform binaries
        run: |
          cid=$(docker create "${{ env.cli_image }}:${{ inputs.cli_image_tag }}")
          docker cp "$cid:/binaries/scraper-linux-amd64" ./scraper-linux-amd64
          docker cp "$cid:/binaries/scraper-linux-arm64" ./scraper-linux-arm64
          docker cp "$cid:/binaries/scraper-darwin-amd64" ./scraper-darwin-amd64
          docker cp "$cid:/binaries/scraper-darwin-arm64" ./scraper-darwin-arm64
          docker rm "$cid"
          chmod +x ./scraper-*
          ./scraper-linux-amd64 --version

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.release_tag }}" \
            --title "Scraper CLI ${{ inputs.release_tag }}" \
            --notes "$(cat <<'EOF'
          ## Scraper CLI

          Scraper binary for the Instruqt track generation plugin.

          Built from mono repo commit: ${{ inputs.cli_image_tag }}

          ### Installation

          The plugin auto-installs this binary on first use. To install manually:

          ```bash
          # Linux (amd64)
          curl -fsSL https://github.com/instruqt/ai-plugins/releases/download/${{ inputs.release_tag }}/scraper-linux-amd64 \
            -o ~/.instruqt/bin/scraper
          chmod +x ~/.instruqt/bin/scraper

          # macOS (Apple Silicon)
          curl -fsSL https://github.com/instruqt/ai-plugins/releases/download/${{ inputs.release_tag }}/scraper-darwin-arm64 \
            -o ~/.instruqt/bin/scraper
          chmod +x ~/.instruqt/bin/scraper
          ```
          EOF
          )" \
            ./scraper-linux-amd64 \
            ./scraper-linux-arm64 \
            ./scraper-darwin-amd64 \
            ./scraper-darwin-arm64
